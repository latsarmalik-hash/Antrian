<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cek Nomor Antrian</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
        }

        h1 {
            margin: 0;
            font-size: 22px;
        }

        #number {
            font-size: 70px;
            font-weight: bold;
            margin-top: 20px;
            color: #2a5298;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Nomor Antrian Saat Ini</h1>
    <div id="number">Loading...</div>
    <div class="footer">Auto update setiap 5 detik</div>
</div>

<script>
    const sheetID = "1FiRTM9smgyGFdUPPgP9OyEcCUddIAHBKNh4NqVDEBmw";
    const sheetName = "Sheet1"; // ganti kalau nama tab berbeda

    const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=${sheetName}`;

    function loadData() {
        fetch(url)
            .then(response => response.text())
            .then(data => {
                const json = JSON.parse(data.substring(47).slice(0, -2));
                const number = json.table.rows[0].c[1].v;
                document.getElementById("number").innerText = number;
            })
            .catch(error => {
                console.error(error);
                document.getElementById("number").innerText = "Tidak Bisa Akses Data";
            });
    }

    loadData();
    setInterval(loadData, 5000);
</script>

</body>
</html>
