<!DOCTYPE html>
<html>
<head>
    <title>Cek Nomor Antrian</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            background-color: #f2f2f2;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 24px;
        }
        #number {
            font-size: 60px;
            color: green;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Nomor Antrian Saat Ini</h1>
    <div id="number">Loading...</div>
</div>

<script>
const sheetID = "1FiRTM9smgyGFdUPPgP9OyEcCUddIAHBKNh4NqVDEBmw";
const sheetName = "Sheet1"; // ganti kalau nama tab beda

const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&tq&sheet=${sheetName}`;

fetch(url)
  .then(res => res.text())
  .then(data => {
    const json = JSON.parse(data.substring(47).slice(0, -2));
    const number = json.table.rows[0].c[1].v;
    document.getElementById("number").innerText = number;
  })
  .catch(err => {
    console.error(err);
    document.getElementById("number").innerText = "Tidak Bisa Akses Data";
  });
</script>

</body>
</html>
