<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistem Antrian</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
    text-align:center;
}

.container {
    margin-top:60px;
}

.card {
    background:white;
    color:#333;
    padding:30px;
    border-radius:15px;
    display:inline-block;
    min-width:300px;
}

#number {
    font-size:70px;
    margin:20px 0;
    color:#2a5298;
}

button {
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

.admin-panel {
    margin-top:20px;
}
</style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Nomor Antrian Saat Ini</h2>
        <div id="number">Loading...</div>
    </div>

    <div class="card admin-panel">
        <h3>Admin Panel</h3>
        <input type="number" id="newNumber" placeholder="Masukkan Nomor Baru">
        <br><br>
        <button onclick="updateNumber()">Update Nomor</button>
    </div>
</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycby5BCNdTUN1PZuePuFfzTfnFhjzNgFSukLRaqhYUUx9Xe7djo2ofYSQS88jUg125MXCVw/exec";

function loadNumber(){
    fetch(`${scriptURL}?action=get`)
    .then(res=>res.text())
    .then(data=>{
        document.getElementById("number").innerText = data;
    });
}

function updateNumber(){
    const newNumber = document.getElementById("newNumber").value;
    fetch(`${scriptURL}?action=set&number=${newNumber}`)
    .then(res=>res.text())
    .then(()=>{
        loadNumber();
        alert("Nomor berhasil diperbarui");
    });
}

loadNumber();
setInterval(loadNumber, 5000);

</script>

</body>
</html>
