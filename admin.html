<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel Antrian</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background:#f4f6f9;
    text-align:center;
}

.container {
    margin-top:80px;
}

.card {
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
    display:inline-block;
    width:90%;
    max-width:400px;
}

input {
    padding:12px;
    width:90%;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
}

button {
    padding:12px 20px;
    margin:6px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    background:#2c5364;
    color:white;
}

button:hover {
    opacity:0.85;
}

.status {
    margin-top:15px;
    font-size:14px;
}
</style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Admin Panel</h2>

        <input type="password" id="password" placeholder="Masukkan Password">
        <input type="number" id="number" placeholder="Nomor Baru">

        <button onclick="updateNumber()">Update Nomor</button>
        <button onclick="increment()">+1</button>
        <button onclick="resetNumber()">Reset ke 1</button>

        <div class="status" id="status"></div>
    </div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbypb4qhwig6XkXp5bxgJ3rc0K3MQZC8jJjNnO0_aWucZrPgnBy8oak3BCWTPC6wxi-4pg/exec";
let currentNumber = 0;

function getCurrent(){
    fetch(`${scriptURL}?action=get`)
    .then(res=>res.text())
    .then(data=>{
        currentNumber = parseInt(data);
    });
}

function updateNumber(){
    const number = document.getElementById("number").value;
    const password = document.getElementById("password").value;

    fetch(`${scriptURL}?action=set&number=${number}&password=${password}`)
    .then(res=>res.text())
    .then(data=>{
        if(data === "Success"){
            document.getElementById("status").innerText = "Berhasil diupdate";
            getCurrent();
        } else {
            document.getElementById("status").innerText = "Password salah!";
        }
    });
}

function increment(){
    const password = document.getElementById("password").value;
    const newNumber = currentNumber + 1;

    fetch(`${scriptURL}?action=set&number=${newNumber}&password=${password}`)
    .then(res=>res.text())
    .then(data=>{
        if(data === "Success"){
            document.getElementById("status").innerText = "Nomor +1";
            getCurrent();
        } else {
            document.getElementById("status").innerText = "Password salah!";
        }
    });
}

function resetNumber(){
    const password = document.getElementById("password").value;

    fetch(`${scriptURL}?action=set&number=1&password=${password}`)
    .then(res=>res.text())
    .then(data=>{
        if(data === "Success"){
            document.getElementById("status").innerText = "Reset ke 1";
            getCurrent();
        } else {
            document.getElementById("status").innerText = "Password salah!";
        }
    });
}

getCurrent();
</script>

</body>
</html>
