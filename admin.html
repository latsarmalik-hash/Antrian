<!DOCTYPE html>
<html>
<head>
<title>Admin Antrian</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: Arial;
  text-align:center;
  background:#f2f2f2;
}
input, button {
  padding:10px;
  margin:5px;
}
</style>
</head>
<body>

<h2>Admin Panel</h2>

<input type="password" id="password" placeholder="Password">
<br>
<input type="number" id="number" placeholder="Nomor Baru">
<br>
<button onclick="updateNumber()">Update</button>

<p id="status"></p>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbypb4qhwig6XkXp5bxgJ3rc0K3MQZC8jJjNnO0_aWucZrPgnBy8oak3BCWTPC6wxi-4pg/exec";

function updateNumber(){
  const number = document.getElementById("number").value;
  const password = document.getElementById("password").value;

  fetch(`${scriptURL}?action=set&number=${number}&password=${password}`)
  .then(res=>res.text())
  .then(data=>{
    if(data === "Success"){
      document.getElementById("status").innerText = "Berhasil diupdate";
    } else {
      document.getElementById("status").innerText = "Password salah!";
    }
  });
}
</script>

</body>
</html>
